<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis Travaux</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
        }
        .content {
            padding: 20px;
        }
        .content h2 {
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
        }
        .form-group textarea {
            height: 100px;
        }
        .btn {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Teknika-skoto</h1>
        </div>
        <div class="content">
            <h2>Demande de devis</h2>
            <form>
                <div class="form-group">
                    <label>Nom et prénom :</label>
                    <input type="text" name="nom" required>
                </div>
                <div class="form-group">
                    <label>Adresse :</label>
                    <input type="text" name="adresse" required>
                </div>
                <div class="form-group">
                    <label>Lieu de la pose :</label>
                    <input type="text" name="lieu_pose" required>
                </div>
                <div class="form-group">
                    <label>Type de travaux :</label>
                    <select name="type_travaux">
                        <option value="pose_porte">Pose de porte</option>
                        <option value="pose_fenetre">Pose de fenêtre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Dimensions :</label>
                    <input type="text" name="dimensions" required>
                </div>
                <div class="form-group">
                    <label>Modèle choisi :</label>
                    <input type="text" name="modele" required>
                </div>
                <div class="form-group">
                    <label>Couleur :</label>
                    <input type="text" name="couleur" required>
                </div>
                <div class="form-group">
                    <label>Vitrage :</label>
                    <select name="vitrage">
                        <option value="simple">Simple</option>
                        <option value="double">Double</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Épaisseur du vitrage :</label>
                    <input type="text" name="epaisseur_vitrage" required>
                </div>
                <div class="form-group">
                    <label>Accessoires :</label>
                    <textarea name="accessoires"></textarea>
                </div>
                <button class="btn" type="submit">Envoyer</button>
            </form>
        </div>
    </div>
</body>
</html>
